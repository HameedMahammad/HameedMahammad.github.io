<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Electronics & Embedded Systems</title>
    <style>
        /* CSS Variables for a "Silicon & Solder" Dark Theme */
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: #15161a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-glow: #00ffcc; /* Neon cyan/green trace color */
            --trace-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            background-image: 
                linear-gradient(var(--trace-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--trace-color) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: -1px -1px;
        }

        /* Overlay to fade out the grid slightly */
        .overlay {
            background: radial-gradient(circle at center, transparent 0%, var(--bg-base) 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, section {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            margin: 1rem auto;
            background-color: rgba(21, 22, 26, 0.95);
            border: 1px solid var(--trace-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        header {
            text-align: center;
            border-top: 4px solid var(--accent-glow);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--accent-glow);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--trace-color);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--accent-glow);
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .contact-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }
